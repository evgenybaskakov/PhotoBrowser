<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Browser</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-top">
                <h1>Photo Browser</h1>
                <form class="header-search" id="searchForm" role="search">
                    <input type="search" id="searchInput" class="search-input" placeholder="Search folders…" autocomplete="off" enterkeyhint="search">
                    <button type="submit" id="searchBtn" class="btn-primary btn-small search-btn">Search</button>
                    <button type="button" id="clearSearchBtn" class="btn-secondary btn-small search-clear-btn" hidden>Clear</button>
                </form>
            </div>
            <div class="header-toolbar">
                <div class="breadcrumb">
                    <span id="breadcrumbPath"></span>
                </div>
                <div class="header-actions">
                    <button type="button" id="revealCurrentFolderBtn" class="btn-secondary btn-small header-reveal-btn" hidden>Reveal</button>
                    <button type="button" id="trashCurrentFolderBtn" class="btn-danger btn-small header-trash-btn" hidden>Trash</button>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="main-content" id="mainContent">
            <!-- Folders Section -->
            <section class="folders-section">
                <div id="foldersList" class="items-grid">
                    <div class="loading">Loading folders...</div>
                </div>
            </section>

            <!-- Images Section -->
            <section class="images-section">
                <div id="imagesList" class="items-grid">
                    <div class="loading">Loading images...</div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal for confirming move to trash -->
    <div id="deleteModal" class="modal">
        <div class="modal-content small">
            <h2>Move to Trash</h2>
            <p id="deleteMessage"></p>
            <div class="modal-actions">
                <button id="confirmDelete" class="btn-danger">Move to Trash</button>
                <button id="cancelDelete" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
